apiVersion: apps/v1
kind: Deployment
metadata:
  name: dwob-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dwob-site
  template:
    metadata:
      labels:
        app: dwob-site
    spec:
      containers:
        - name: dwob-site
          image: ghcr.io/YOUR_GITHUB_USER/dwob-site:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dwob-site
spec:
  selector:
    app: dwob-site
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
